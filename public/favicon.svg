<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Glowing gradient background circle matching Billing Zone (Blue & Green) branding -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="#ffffff" stroke-width="12" filter="url(#glow)"/>
  
  <!-- Stylized Receipt Printer (Core POS theme) -->
  <!-- Printer body -->
  <path d="M140 270H372V390C372 406.569 358.569 420 342 420H170C153.431 420 140 406.569 140 390V270Z" fill="#1e293b"/>
  <!-- Printer top slot -->
  <rect x="160" y="235" width="192" height="35" rx="8" fill="#475569"/>
  <!-- Paper feeding out -->
  <path d="M180 120H332V235H180V120Z" fill="#ffffff"/>
  <!-- Zagged tear-off bottom of receipt paper -->
  <path d="M180 220 l12 10 l12-10 l12 10 l12-10 l12 10 l12-10 l12 10 l12-10 l12 10 l12-10 l12 10 l12-10 l12 10 l16-10" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Barcode / invoice details lines on paper -->
  <line x1="205" y1="150" x2="307" y2="150" stroke="#0088cc" stroke-width="8" stroke-linecap="round"/>
  <line x1="205" y1="172" x2="275" y2="172" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <line x1="205" y1="194" x2="307" y2="194" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Subtle Shopping Cart / POS detail icon engraved on printer -->
  <path d="M232 320 H262 L270 350 H240 Z" fill="#64748b"/>
  <circle cx="244" cy="362" r="5" fill="#64748b"/>
  <circle cx="268" cy="362" r="5" fill="#64748b"/>
  <path d="M228 308 L235 320" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow" x="-20" y="-20" width="552" height="552" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>